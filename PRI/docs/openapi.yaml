  /PRI/extract_identificacion_openai.php:
    post:
      tags: [IA]
      summary: Extraer datos de identificacion con OpenAI
      description: |
        Servicio auxiliar de extraccion de datos desde una imagen de identificacion.
        El frontend lo usa para poblar el modal de revision antes de guardar la persona.

        Notas de uso actual:
        - `image_data_url` es obligatorio.
        - `raw_text` se envia como apoyo OCR, pero la imagen sigue siendo la fuente principal.
        - `image_size_mb` e `images_count` son metadatos informativos enviados por frontend.
        - La respuesta util para frontend vive principalmente en `result.fields`.
      operationId: extraerIdentificacionOpenAI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractIdentificationOpenAIRequest'
            examples:
              ine_compuesta:
                value:
                  image_data_url: data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...
                  raw_text: NOMBRE RODRIGUEZ BALLEZA DULCE MARIA CURP ROBD...
                  image_size_mb: 1.842
                  images_count: 2
      responses:
        '200':
          description: Extraccion completada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractIdentificationOpenAIResponse'
        '400':
          description: JSON invalido, request vacio o imagen no valida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          description: Metodo no permitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno o fallo al consumir OpenAI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
