components:
  schemas:
    ApiError:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
        message:
          type: string
          nullable: true
        code:
          type: integer
          nullable: true

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: Username o email
        password:
          type: string
          format: password

    LoginSuccessResponse:
      type: object
      required: [token, token_type, expires_at, expires_in_seconds, usuario, persona, rol, territorios]
      properties:
        token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: string
          example: '2026-07-02 22:30:00'
        expires_in_seconds:
          type: integer
          example: 28800
        usuario:
          $ref: '#/components/schemas/UsuarioSesion'
        persona:
          $ref: '#/components/schemas/PersonaSesion'
        rol:
          $ref: '#/components/schemas/Rol'
        parent_user:
          allOf:
            - $ref: '#/components/schemas/UsuarioPadre'
          nullable: true
        territorios:
          type: array
          items:
            $ref: '#/components/schemas/TerritorioAsignado'

    LoginLockedResponse:
      type: object
      required: [ok, error, locked_until, minutes_left]
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          example: Cuenta temporalmente bloqueada
        locked_until:
          type: string
        minutes_left:
          type: integer

    LoginBlockedAttemptsResponse:
      type: object
      required: [ok, error, blocked_minutes]
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          example: Cuenta bloqueada por multiples intentos fallidos
        blocked_minutes:
          type: integer

    UsuarioSesion:
      type: object
      properties:
        usuario_id:
          type: integer
        uuid:
          type: string
        username:
          type: string
        nombre:
          type: string
        apellido_paterno:
          type: string
          nullable: true
        apellido_materno:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        telefono:
          type: string
          nullable: true
        persona_id:
          type: integer
          nullable: true
        requiere_cambio_password:
          type: boolean
        ultimo_login_at:
          type: string
        total_hijos_directos:
          type: integer

    PersonaSesion:
      type: object
      properties:
        persona_id:
          type: integer
          nullable: true
        nombres:
          type: string
          nullable: true
        apellido_paterno:
          type: string
          nullable: true
        apellido_materno:
          type: string
          nullable: true

    UsuarioPadre:
      type: object
      properties:
        usuario_id:
          type: integer
        username:
          type: string
        nombre:
          type: string
        apellido_paterno:
          type: string
          nullable: true
        apellido_materno:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        rol_codigo:
          type: string
        rol_nombre:
          type: string

    Rol:
      type: object
      properties:
        rol_id:
          type: integer
        codigo:
          type: string
          example: COORD_GENERAL
        nombre:
          type: string
        nivel_jerarquico:
          type: integer

    TerritorioAsignado:
      type: object
      properties:
        territorio_id:
          type: integer
        territorio_padre_id:
          type: integer
          nullable: true
        tipo:
          type: string
          example: SECCION
        codigo:
          type: string
          nullable: true
        nombre:
          type: string
        municipio:
          type: string
          nullable: true
        estado:
          type: string
          nullable: true
        distrito_local:
          type: string
          nullable: true
        distrito_federal:
          type: string
          nullable: true
        fecha_inicio:
          type: string
          nullable: true
        fecha_fin:
          type: string
          nullable: true

    PermissionFlags:
      type: object
      properties:
        edit:
          type: boolean

    EstatusSimple:
      type: object
      properties:
        codigo:
          type: string
          nullable: true
        nombre:
          type: string
          nullable: true

    TerritorioSimple:
      type: object
      properties:
        territorio_id:
          type: integer
          nullable: true
        codigo:
          type: string
          nullable: true
        nombre:
          type: string
          nullable: true
        tipo:
          type: string
          nullable: true

    ResponsableResumen:
      type: object
      properties:
        usuario_id:
          type: integer
          nullable: true
        username:
          type: string
          nullable: true
        nombre:
          type: string
          nullable: true
        apellido_paterno:
          type: string
          nullable: true
        apellido_materno:
          type: string
          nullable: true
        nombre_completo:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        telefono:
          type: string
          nullable: true

    ParticipacionActual:
      type: object
      properties:
        participacion_id:
          type: integer
          nullable: true
        folio:
          type: string
          nullable: true
        tipo_participacion:
          type: string
          nullable: true
          enum: [SIMPATIZANTE, AFILIADO]
        tipo_actual:
          type: string
          nullable: true
        fallback:
          type: boolean
          nullable: true
        participacion_origen_id:
          type: integer
          nullable: true
        estatus_id:
          type: integer
        estatus:
          $ref: '#/components/schemas/EstatusSimple'
        territorio_id:
          type: integer
          nullable: true
        usuario_responsable_id:
          type: integer
          nullable: true
        fuente_captura:
          type: string
          nullable: true
        fecha_registro:
          type: string
          nullable: true
        fecha_afiliacion:
          type: string
          nullable: true
        numero_afiliacion:
          type: string
          nullable: true
        observaciones:
          type: string
          nullable: true
        activo:
          type: integer
          nullable: true
        created_at:
          type: string
          nullable: true
        updated_at:
          type: string
          nullable: true

    ParticipacionResumen:
      type: object
      description: |
        Resumen de participaciones activas de la persona.
        En personas afiliadas es normal que `activas` incluya tanto `AFILIADO` como `SIMPATIZANTE`.
      properties:
        actual:
          allOf:
            - $ref: '#/components/schemas/ParticipacionActiva'
          nullable: true
        tipo_actual:
          type: string
          nullable: true
        tiene_simpatizante_activo:
          type: boolean
        tiene_afiliado_activo:
          type: boolean
        participaciones_activas:
          type: integer
        activas:
          type: array
          items:
            $ref: '#/components/schemas/ParticipacionActiva'

    ParticipacionActiva:
      type: object
      properties:
        participacion_id:
          type: integer
        folio:
          type: string
          nullable: true
        persona_id:
          type: integer
        tipo_participacion:
          type: string
          enum: [SIMPATIZANTE, AFILIADO]
        participacion_origen_id:
          type: integer
          nullable: true
        estatus_id:
          type: integer
        estatus:
          $ref: '#/components/schemas/EstatusSimple'
        territorio_id:
          type: integer
          nullable: true
        territorio:
          $ref: '#/components/schemas/TerritorioSimple'
        usuario_responsable_id:
          type: integer
          nullable: true
        usuario_responsable:
          $ref: '#/components/schemas/ResponsableBasico'
        fuente_captura:
          type: string
          nullable: true
        fecha_registro:
          type: string
          nullable: true
        fecha_afiliacion:
          type: string
          nullable: true
        numero_afiliacion:
          type: string
          nullable: true
        observaciones:
          type: string
          nullable: true
        activo:
          type: integer
        created_at:
          type: string
          nullable: true
        created_by:
          type: integer
          nullable: true
        updated_at:
          type: string
          nullable: true
        updated_by:
          type: integer
          nullable: true

    ResponsableBasico:
      type: object
      properties:
        usuario_id:
          type: integer
          nullable: true
        username:
          type: string
          nullable: true
        nombre:
          type: string
          nullable: true
        apellido_paterno:
          type: string
          nullable: true
        apellido_materno:
          type: string
          nullable: true
        nombre_completo:
          type: string
          nullable: true

    TerritorioPersona:
      type: object
      description: |
        En consulta individual de persona normalmente vienen `seccion` y `zona`.
        El bloque `participacion` aparece en respuestas donde el endpoint tambien expone el territorio asociado a la participacion activa.
      properties:
        seccion:
          $ref: '#/components/schemas/TerritorioSimple'
        zona:
          type: object
          properties:
            territorio_id:
              type: integer
              nullable: true
            codigo:
              type: string
              nullable: true
            nombre:
              type: string
              nullable: true
        participacion:
          type: object
          properties:
            territorio_id:
              type: integer
              nullable: true
            codigo:
              type: string
              nullable: true
            nombre:
              type: string
              nullable: true
            tipo:
              type: string
              nullable: true
            zona:
              type: object
              properties:
                territorio_id:
                  type: integer
                  nullable: true
                codigo:
                  type: string
                  nullable: true
                nombre:
                  type: string
                  nullable: true

    Persona:
