        cic_hash:
          type: string
          nullable: true
        idmex_hash:
          type: string
          nullable: true
        seccion_id:
          type: integer
          nullable: true
        anio_registro:
          type: integer
          nullable: true
        emision:
          type: integer
          nullable: true
        vigencia_inicio:
          type: string
          nullable: true
        vigencia_fin:
          type: string
          nullable: true
        domicilio_texto:
