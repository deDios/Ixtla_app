    Archivo:
      type: object
      description: |
        Representa un archivo asociado a una entidad del sistema.
        Cuando `es_actual` es 1, el archivo se considera la version vigente para esa combinacion
        de `entidad_tipo`, `entidad_id` y `uso_archivo`. Si reemplaza otro archivo, ese vinculo
        se refleja en `reemplaza_archivo_id`.
      properties:
        archivo_id:
          type: integer
        uuid:
          type: string
        entidad_tipo:
          type: string
          enum: [PERSONA, USUARIO, PARTICIPACION]
        entidad_id:
          type: integer
        uso_archivo:
          type: string
          enum: [INE_FRENTE, INE_REVERSO, FOTO_PERSONA, FOTO_USUARIO, COMPROBANTE_DOMICILIO, FIRMA, DOCUMENTO_AFILIACION, EVIDENCIA, OTRO]
        nombre_original:
          type: string
          nullable: true
        nombre_storage:
          type: string
        url_archivo:
          type: string
        url_thumbnail:
          type: string
          nullable: true
        mime_type:
          type: string
          nullable: true
        extension:
          type: string
          nullable: true
        tamano_bytes:
          type: integer
          nullable: true
        sha256_hash:
          type: string
          nullable: true
        version_no:
          type: integer
        es_actual:
          type: integer
        reemplaza_archivo_id:
          type: integer
          nullable: true
        privado:
          type: integer
        uploaded_by:
          type: integer
          nullable: true
        uploaded_by_usuario:
          $ref: '#/components/schemas/ResponsableBasico'
        uploaded_at:
          type: string
          nullable: true
        updated_at:
          type: string
          nullable: true
        updated_by:
          type: integer
          nullable: true

