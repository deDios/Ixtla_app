openapi: 3.0.3
info:
  title: Ixtla App API
  version: 0.3.0
  description: |
    Primer contrato OpenAPI para los endpoints PHP usados por el modulo RED.

    Notas de esta version:
    - La API actual usa mayormente `POST`, incluso para consultas.
    - El spec describe el comportamiento real del proyecto hoy en dia.
    - Se documentan los endpoints mas usados por el frontend RED y por el portal de administracion.
    - Muchos endoints no tienen validaciones como reglas de negocio, entonces reciben la informacion tal cual como viene.
servers:
  - url: /
    description: Mismo host donde corre la app
tags:
  - name: Auth
    description: Inicio de sesion y emision de token
  - name: RED
    description: Dashboard principal de RED
  - name: Personas
    description: Consulta y alta de personas
  - name: Catalogos
    description: Catalogos y relaciones auxiliares del modulo RED
  - name: IA
    description: Servicios auxiliares de extraccion y analisis asistido por IA
paths:
  /PRI/db/WEB/ixtla_login.php:
    post:
      tags: [Auth]
      summary: Iniciar sesion
      description: Valida credenciales, registra el login y devuelve un JWT junto con datos del usuario.
      operationId: loginUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              basico:
                value:
                  username: admin@example.com
                  password: secret123
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '400':
          description: JSON invalido o parametros incompletos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Credenciales invalidas
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiError'
                  - type: object
                    properties:
                      attempts_left:
                        type: integer
                        nullable: true
        '423':
          description: Cuenta bloqueada temporalmente
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginLockedResponse'
                  - $ref: '#/components/schemas/LoginBlockedAttemptsResponse'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /PRI/db/WEB/ixtla_c_red_home.php:
    post:
      tags: [RED]
      summary: Consultar dashboard RED
      description: |
        Resuelve el universo visible por jerarquia, aplica filtros y devuelve
        metricas y listado paginado de personas y participaciones.
      operationId: consultarRedHome
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedHomeRequest'
            examples:
              listado_basico:
                value:
                  usuario_id: 15
                  rol_codigo: COORD_ZONA
                  page: 1
                  page_size: 10
                  search: garcia
                  sort_key: default
                  sort_dir: desc
      responses:
        '200':
          description: Consulta exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedHomeResponse'
        '400':
          description: Request invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /PRI/db/WEB/ixtla_c_persona.php:
    post:
      tags: [Personas]
      summary: Consultar personas
      description: |
        Consulta una persona por `persona_id` o devuelve un listado paginado con filtros.
        Si se envia `persona_id` o `id`, la respuesta `data` es un objeto.
        Si no se envia id, la respuesta `data` es un arreglo con `meta`.
      operationId: consultarPersonas
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaQueryRequest'
            examples:
              por_id:
                value:
                  persona_id: 102
                  rol_codigo: ADMIN
              listado:
                value:
                  page: 1
                  page_size: 20
                  q: lopez
                  estatus_id: 4
                  seccion_id: 321
                  rol_codigo: COORD_GENERAL
      responses:
        '200':
          description: Consulta exitosa
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PersonaDetailResponse'
                  - $ref: '#/components/schemas/PersonaListResponse'
        '404':
          description: Persona no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /PRI/db/WEB/ixtla_i_persona.php:
    post:
      tags: [Personas]
      summary: Crear persona
      description: |
        Inserta una persona y sincroniza su participacion RED inicial.
        Si `tipo_participacion` no se envia, el backend puede crear por default una participacion
        de tipo `SIMPATIZANTE`.
      operationId: crearPersona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePersonaRequest'
            examples:
              simpatizante:
                value:
                  nombres: Juan
                  apellido_paterno: Perez
                  apellido_materno: Garcia
                  telefono: "3312345678"
                  seccion_id: 321
                  estatus_id: 1
                  capturado_por: 15
                  created_by: 15
                  tipo_participacion: SIMPATIZANTE
                  acepta_tratamiento_datos: 1
                  acepta_datos_sensibles: 1
              afiliado:
                value:
                  nombres: Maria
                  apellido_paterno: Lopez
                  telefono: "3331234567"
                  curp: LOPM900101MJCXXX01
                  clave_elector: ABCD123456HDFRNN09
                  seccion_id: 321
                  capturado_por: 8
                  created_by: 8
                  tipo_participacion: AFILIADO
                  fecha_afiliacion: '2026-07-02'
                  numero_afiliacion: AFI-2026-0001
      responses:
        '201':
          description: Persona creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePersonaResponse'
        '400':
          description: Datos invalidos o FK invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Persona duplicada por dato sensible unico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicatePersonaResponse'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /PRI/db/WEB/ixtla_u_persona.php:
    post:
      tags: [Personas]
      summary: Actualizar persona
      description: |
        Actualiza una persona existente. El frontend RED usa normalmente `POST`,
        pero el endpoint tambien acepta `PUT` y `PATCH`.

        Si `update_context` es `RED_HOME_PERSON_EDIT`, el backend restringe los
        campos permitidos y valida permisos segun rol y tipo de participacion.
      operationId: actualizarPersonaPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePersonaRequest'
            examples:
              general:
                value:
                  persona_id: 102
                  telefono: "3312345678"
                  email: persona@example.com
                  updated_by: 15
              red_home:
                value:
                  persona_id: 102
                  seccion_id: 321
                  domicilio_texto: Calle Reforma 10
                  telefono: "3312345678"
                  estatus_id: 4
                  tipo_participacion: AFILIADO
                  participacion_estatus_id: 4
                  usuario_responsable_id: 15
                  rol_codigo: COORD_GENERAL
                  update_context: RED_HOME_PERSON_EDIT
                  updated_by: 15
      responses:
        '200':
          description: Persona actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePersonaResponse'
        '400':
          description: Datos invalidos o request incompleto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Sin permisos para editar el registro en el contexto RED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Persona no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Duplicado por dato unico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags: [Personas]
      summary: Actualizar persona
      description: Misma operacion que `POST` sobre este endpoint.
      operationId: actualizarPersonaPut
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePersonaRequest'
      responses:
        '200':
          description: Persona actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePersonaResponse'
        '400':
          description: Datos invalidos o request incompleto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Sin permisos para editar el registro en el contexto RED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Persona no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Duplicado por dato unico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    patch:
      tags: [Personas]
      summary: Actualizar persona parcialmente
      description: Misma operacion que `POST` sobre este endpoint.
      operationId: actualizarPersonaPatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePersonaRequest'
      responses:
        '200':
          description: Persona actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePersonaResponse'
        '400':
          description: Datos invalidos o request incompleto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Sin permisos para editar el registro en el contexto RED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Persona no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Duplicado por dato unico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /PRI/db/WEB/ixtla_c_archivo.php:
    post:
      tags: [Personas]
      summary: Consultar archivos
      description: |
        Consulta un archivo por `archivo_id` o `uuid`, o devuelve un listado paginado.
        En el home RED se usa sobre todo para cargar archivos actuales de una persona.
      operationId: consultarArchivos
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchivoQueryRequest'
            examples:
              por_id:
                value:
                  archivo_id: 55
              listado_persona:
                value:
                  entidad_tipo: PERSONA
                  entidad_id: 102
                  es_actual: 1
                  page: 1
                  page_size: 20
      responses:
        '200':
          description: Consulta exitosa
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ArchivoDetailResponse'
                  - $ref: '#/components/schemas/ArchivoListResponse'
        '400':
          description: Request invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Archivo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /PRI/db/WEB/ixtla_i_archivo.php:
    post:
      tags: [Personas]
      summary: Crear archivo
      description: |
        Registra un archivo asociado a una entidad.

        Si `url_archivo` llega como `data:image/...;base64,...`, el backend guarda el
        binario en `/PRI/uploads/personas/{id}/` y en base de datos conserva la URL publica.
      operationId: crearArchivo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArchivoRequest'
            examples:
              documento_afiliacion:
                value:
                  entidad_tipo: PERSONA
                  entidad_id: 102
                  uso_archivo: DOCUMENTO_AFILIACION
                  nombre_original: documento_afiliacion.jpg
                  nombre_storage: persona_102_documento_afiliacion_1720000000.jpg
                  url_archivo: data:image/jpeg;base64,/9j/4AAQSkZJRgABAQ...
                  mime_type: image/jpeg
                  extension: jpg
                  tamano_bytes: 145678
                  es_actual: 1
                  privado: 1
                  uploaded_by: 15
                  updated_by: 15
              consulta_publica:
                value:
                  entidad_tipo: PERSONA
                  entidad_id: 102
                  uso_archivo: INE_FRENTE
                  nombre_storage: persona_102_ine_frente.jpg
                  url_archivo: /PRI/uploads/personas/102/persona_102_ine_frente.jpg
                  es_actual: 1
                  privado: 1
      responses:
        '201':
          description: Archivo creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateArchivoResponse'
        '400':
          description: Datos invalidos o FK invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Entidad relacionada no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Duplicado por uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /PRI/db/WEB/ixtla_c_persona_participacion.php:
    post:
      tags: [Personas]
      summary: Consultar participaciones
      description: |
        Consulta una participacion por `participacion_id` o devuelve un listado paginado.
        En la practica, este endpoint se usa junto con reglas de frontend y campos de contexto;
        no se documenta Bearer como obligatorio mientras la validacion backend no sea uniforme.
      operationId: consultarParticipaciones
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipacionQueryRequest'
            examples:
              por_id:
                value:
                  participacion_id: 29
              listado_persona:
                value:
                  persona_id: 8328
                  activo: 1
                  page: 1
                  page_size: 20
      responses:
        '200':
          description: Consulta exitosa
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ParticipacionDetailResponse'
                  - $ref: '#/components/schemas/ParticipacionListResponse'
        '400':
          description: Request invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Participacion no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /PRI/db/WEB/ixtla_u_persona_participacion.php:
    post:
      tags: [Personas]
      summary: Actualizar participacion
      description: |
        Actualiza una participacion existente por `participacion_id`.
        Aunque el endpoint anuncia varios metodos HTTP, en la practica el frontend trabaja con JSON
        y este contrato lo documenta con `POST` como flujo principal.
      operationId: actualizarParticipacionPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParticipacionRequest'
            examples:
              cambio_estatus:
                value:
                  participacion_id: 29
                  estatus_id: 4
                  updated_by: 1
              cambio_tipo_contexto_red:
                value:
                  participacion_id: 26
                  tipo_participacion: AFILIADO
                  estatus_id: 4
                  territorio_id: 79
                  usuario_responsable_id: 1
                  fuente_captura: PORTAL
                  updated_by: 1
      responses:
        '200':
          description: Participacion actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateParticipacionResponse'
        '400':
          description: Datos invalidos o request incompleto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Participacion no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Duplicado por campo unico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags: [Personas]
      summary: Actualizar participacion
      description: Misma operacion que `POST` sobre este endpoint.
      operationId: actualizarParticipacionPut
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParticipacionRequest'
      responses:
        '200':
          description: Participacion actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateParticipacionResponse'
        '400':
          description: Datos invalidos o request incompleto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Participacion no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Duplicado por campo unico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    patch:
      tags: [Personas]
      summary: Actualizar participacion parcialmente
      description: Misma operacion que `POST` sobre este endpoint.
      operationId: actualizarParticipacionPatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParticipacionRequest'
      responses:
        '200':
          description: Participacion actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateParticipacionResponse'
        '400':
          description: Datos invalidos o request incompleto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Participacion no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Duplicado por campo unico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /PRI/db/WEB/ixtla_c_usuario.php:
    post:
      tags: [Personas]
      summary: Consultar usuarios
      description: |
        Consulta un usuario por `usuario_id` o devuelve un listado paginado.
        El frontend lo usa sobre todo para cargar detalle de responsable/capturador y para filtros administrativos.
      operationId: consultarUsuarios
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioQueryRequest'
            examples:
              por_id:
                value:
                  usuario_id: 1
              listado:
                value:
                  rol_codigo: COORD_GENERAL
                  estatus_codigo: ACTIVO
                  include_deleted: 0
                  page: 1
                  page_size: 20
      responses:
        '200':
          description: Consulta exitosa
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UsuarioDetailResponse'
                  - $ref: '#/components/schemas/UsuarioListResponse'
        '400':
          description: Request invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /PRI/db/WEB/ixtla_i_usuario.php:
    post:
      tags: [Personas]
      summary: Crear usuario
      description: |
        Crea un usuario nuevo.
        Requiere `nombre`, `email` y `password`.
        El backend acepta `rol_id` o `rol_codigo`; si no se manda `estatus_id`, usa `4`.
      operationId: crearUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsuarioRequest'
            examples:
              basico:
                value:
                  username: CoordZona12
                  rol_codigo: COORD_ZONA
                  nombre: Coordinacion Zona 12
                  email: coordzona12@ixtla.local
                  password: temporal123
                  requiere_cambio_password: 1
                  created_by: 1
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUsuarioResponse'
        '400':
          description: Datos invalidos, password corto o FK invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Duplicado por campo unico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /PRI/db/WEB/ixtla_u_usuario.php:
    post:
      tags: [Personas]
      summary: Actualizar usuario
      description: |
        Actualiza un usuario existente.
        Si se envia `password`, el backend recalcula `password_hash` e incrementa `token_version`.
      operationId: actualizarUsuarioPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUsuarioRequest'
            examples:
              datos_generales:
                value:
                  usuario_id: 1
                  nombre: Coordinador General 01
                  email: corgral01@ixtla.local
                  telefono: '3312345678'
                  updated_by: 1
              cambio_password:
                value:
                  usuario_id: 1
                  password: nuevaClave123
                  requiere_cambio_password: 0
                  updated_by: 1
      responses:
        '200':
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUsuarioResponse'
        '400':
          description: Datos invalidos, request vacio o FK invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
